{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Dashboard Operacional</h3>
    <span class="badge bg-info text-dark">Modern UI v1</span>
    <div>
      <label for="range-select" class="me-2">Período</label>
      <select id="range-select" class="form-select d-inline-block" style="width:180px;">
        <option value="14">Últimos 14 dias</option>
        <option value="7">Últimos 7 dias</option>
        <option value="30">Últimos 30 dias</option>
      </select>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-lg-3 col-md-6">
      <div class="card p-3">
        <div class="card-body">
          <h6 class="card-subtitle mb-2 text-muted">Fila atual</h6>
          <h2 id="kpi-queue">—</h2>
          <small class="text-muted">Pacientes aguardando</small>
        </div>
      </div>
    </div>

    <div class="col-lg-3 col-md-6">
      <div class="card p-3">
        <div class="card-body">
          <h6 class="card-subtitle mb-2 text-muted">Tempo médio (min)</h6>
          <h2 id="kpi-avg-wait">—</h2>
          <small class="text-muted">Média do período</small>
        </div>
      </div>
    </div>

    <div class="col-lg-3 col-md-6">
      <div class="card p-3">
        <div class="card-body">
          <h6 class="card-subtitle mb-2 text-muted">P95 (min)</h6>
          <h2 id="kpi-p95-wait">—</h2>
          <small class="text-muted">Latência crítica</small>
        </div>
      </div>
    </div>

    <div class="col-lg-3 col-md-6">
      <div class="card p-3">
        <div class="card-body">
          <h6 class="card-subtitle mb-2 text-muted">Abandono</h6>
          <h2 id="kpi-abandonment">—</h2>
          <small class="text-muted">Taxa</small>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3 mt-3">
    <div class="col-lg-8">
      <div class="card p-3">
        <div class="card-header">Throughput (últimos 14 dias)</div>
        <div class="card-body">
          <canvas id="chart-throughput" height="120"></canvas>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card p-3">
        <div class="card-header">Queue breakdown</div>
        <div class="card-body">
          <canvas id="chart-breakdown" height="200"></canvas>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="{% static 'administrador/dashboard_modern.js' %}"></script>
<link rel="stylesheet" href="{% static 'administrador/dashboard_modern.css' %}">
{% endblock %}
