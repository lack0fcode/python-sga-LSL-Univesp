services:
  db:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - sga_network

  web:
    build: .
    volumes:
      - .:/app
      - staticfiles:/app/staticfiles
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: sga.settings
      DEBUG: '0'
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_ENV: production
    depends_on:
      - db
    networks:
      - sga_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - staticfiles:/app/staticfiles
    depends_on:
      - web
    networks:
      - sga_network

volumes:
  postgres_data_prod:
  staticfiles:

networks:
  sga_network:
    driver: bridge