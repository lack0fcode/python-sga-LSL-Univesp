name: 'Upload artifact'
description: 'Wrapper composite action for uploading an artifact.'
inputs:
  name:
    description: 'Artifact name'
    required: true
  path:
    description: 'Path to upload (file or directory)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
