name: 'Python setup and dependencies'
description: 'Composite action to install system deps, setup Python and install pip requirements.'
inputs:
  python-version:
    description: 'Python version to set up (for actions/setup-python fallback compatibility)'
    required: false
    default: '3.11'
  requirements:
    description: 'Path to requirements file'
    required: false
    default: 'requirements.txt'
  extra-packages:
    description: 'Extra pip packages to install (space-separated)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        if command -v apt-get >/dev/null 2>&1; then
          apt-get update && apt-get install -y build-essential libpq-dev || true
        fi

    - name: Ensure pip up-to-date
      shell: bash
      run: |
        python -m pip install --upgrade pip || true

    - name: Install requirements
      if: inputs.requirements != ''
      shell: bash
      run: |
        if [ -f "${{ inputs.requirements }}" ]; then
          pip install -r "${{ inputs.requirements }}"
        else
          echo "Requirements file not found: ${{ inputs.requirements }}"
        fi

    - name: Install extra packages
      if: inputs.extra-packages != ''
      shell: bash
      run: |
        pip install ${{ inputs.extra-packages }} || true
