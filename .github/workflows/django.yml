name: Django CI

on:
  push:
    branches: [ "staging", "lack0fdev", "danidev" ]
  pull_request:
    branches: [ "staging", "lack0fdev", "danidev" ]

jobs:
  unit-tests:
    name: Unit tests (fast)
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: sga.tests.settings_test
      DATABASE_URL: 'sqlite:///:memory:'
    steps:
      - uses: actions/checkout@v4

      - name: Restore pip cache
        uses: ./.github/actions/pip-cache
        with:
          requirements: 'requirements.txt'

      - name: Setup Python and install dependencies
        uses: ./.github/actions/python-setup
        with:
          python-version: '3.11'
          requirements: 'requirements.txt'
          extra-packages: 'coverage pytest pytest-django'

      - name: Run Unit Tests with Coverage
        run: |
          coverage run --source=. --omit="bandit_Rodar.py,bandit_analisar.py,test_fluxocompleto2.py" manage.py test tests/tests/unit --settings=sga.tests.settings_test
          coverage report
          coverage html

      - name: Upload Unit Coverage Report
        uses: ./.github/actions/upload-artifact
        with:
          name: coverage-report-unit
          path: htmlcov/

  integration-tests:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    container:
      image: python:3.11-slim-bookworm
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd="pg_isready -U testuser -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Restore pip cache
        uses: ./.github/actions/pip-cache
        with:
          requirements: 'requirements.txt'

      - name: Setup Python and install dependencies
        uses: ./.github/actions/python-setup
        with:
          python-version: '3.11'
          requirements: 'requirements.txt'
          extra-packages: 'coverage pytest pytest-django'

      - name: Run Database Migrations
        env:
          DATABASE_URL: postgres://testuser:testpass@postgres:5432/testdb
        run: python manage.py migrate --run-syncdb

      - name: Collect Static Files
        env:
          DJANGO_SETTINGS_MODULE: sga.settings
          DATABASE_URL: postgres://testuser:testpass@postgres:5432/testdb
        run: python manage.py collectstatic --noinput

      - name: Run Integration Tests with Coverage
        env:
          DJANGO_SETTINGS_MODULE: sga.settings
          DATABASE_URL: postgres://testuser:testpass@postgres:5432/testdb
        run: |
          coverage run --source=. --omit="bandit_Rodar.py,bandit_analisar.py,test_fluxocompleto2.py" manage.py test tests/tests/integration --settings=sga.tests.settings_test || true
          coverage report || true
          coverage html || true

      - name: Upload Integration Coverage Report
        uses: ./.github/actions/upload-artifact
        with:
          name: coverage-report-integration
          path: htmlcov/
      

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black
      - name: Run Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --statistics
      - name: Run Black
        run: black --check .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety bandit mypy
      - name: Run Safety Scan
        run: safety scan .
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
      - name: Run Bandit Security Linter
        run: |
          echo "Running Bandit security analysis using separate script..."
          python bandit_Rodar.py
          echo "Bandit analysis completed successfully"
          
      - name: Analyze Bandit Results
        run: |
          python bandit_analisar.py
      - name: Run MyPy Type Checking
        run: mypy .

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-reports
          path: bandit_report.html
