name: Full Flow Integration (manual / lack0fdev)

on:
  workflow_dispatch:
    inputs:
      confirm_run:
        description: 'Type YES to confirm running the full-flow that may send real messages.'
        required: false
        default: 'NO'
  push:
    branches: [ "lack0fdev" ]

jobs:
  full-flow:
    runs-on: ubuntu-latest
    container:
      image: python:3.11-slim-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Restore pip cache
        uses: ./.github/actions/pip-cache
        with:
          requirements: 'requirements.txt'

      - name: Setup Python and install dependencies
        uses: ./.github/actions/python-setup
        with:
          python-version: '3.11'
          requirements: 'requirements.txt'

      - name: Run Full Integration Script
        env:
          DJANGO_SETTINGS_MODULE: sga.settings
          DATABASE_URL: postgres://testuser:testpass@postgres:5432/testdb
          # Safety guard: clear Twilio secrets by default to avoid accidental real SMS sends.
          TWILIO_ACCOUNT_SID: ""
          TWILIO_AUTH_TOKEN: ""
        run: |
          echo "Running full integration script (test_fluxocompleto2.py)..."
          python test_fluxocompleto2.py || true
          echo "Full integration script finished"

      - name: Upload Integration Test Report (if present)
        uses: ./.github/actions/upload-artifact
        with:
          name: integration-test-report
          path: relatorio_teste_real.html
